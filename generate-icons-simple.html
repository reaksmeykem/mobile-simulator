<!DOCTYPE html>
<html>
<head>
  <title>Generate Icons - Auto Download</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      background: #0a0a0a;
      color: white;
      padding: 40px;
      text-align: center;
    }
    h1 { color: #3b82f6; }
    .status {
      background: rgba(16, 185, 129, 0.2);
      border: 2px solid #10b981;
      padding: 20px;
      border-radius: 12px;
      margin: 20px auto;
      max-width: 500px;
    }
    #progress {
      margin-top: 20px;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>
  <h1>📱 Generating Icons...</h1>
  <div class="status">
    <p id="progress">Starting...</p>
  </div>
  
  <script>
    const progress = document.getElementById('progress');
    
    function createIcon(size) {
      return new Promise((resolve) => {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        
        // Background gradient
        const gradient = ctx.createLinearGradient(0, 0, size, size);
        gradient.addColorStop(0, '#3b82f6');
        gradient.addColorStop(1, '#1e40af');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, size, size);
        
        // Phone shape
        const phoneWidth = size * 0.5;
        const phoneHeight = size * 0.7;
        const phoneX = (size - phoneWidth) / 2;
        const phoneY = (size - phoneHeight) / 2;
        const radius = size * 0.08;
        
        // Phone body
        ctx.fillStyle = '#1a1a1a';
        ctx.beginPath();
        ctx.roundRect(phoneX, phoneY, phoneWidth, phoneHeight, radius);
        ctx.fill();
        
        // Screen
        const screenPadding = size * 0.02;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.roundRect(
          phoneX + screenPadding, 
          phoneY + screenPadding, 
          phoneWidth - screenPadding * 2, 
          phoneHeight - screenPadding * 2, 
          radius * 0.7
        );
        ctx.fill();
        
        // Notch (for larger icons)
        if (size >= 48) {
          const notchWidth = phoneWidth * 0.4;
          const notchHeight = size * 0.04;
          ctx.fillStyle = '#1a1a1a';
          ctx.beginPath();
          ctx.roundRect(
            phoneX + (phoneWidth - notchWidth) / 2,
            phoneY + screenPadding,
            notchWidth,
            notchHeight,
            notchHeight / 2
          );
          ctx.fill();
        }
        
        // Convert to blob and download
        canvas.toBlob((blob) => {
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.download = `icon${size}.png`;
          link.href = url;
          link.click();
          URL.revokeObjectURL(url);
          resolve();
        }, 'image/png');
      });
    }
    
    async function generateAll() {
      progress.textContent = 'Generating icon16.png...';
      await createIcon(16);
      await new Promise(r => setTimeout(r, 300));
      
      progress.textContent = 'Generating icon48.png...';
      await createIcon(48);
      await new Promise(r => setTimeout(r, 300));
      
      progress.textContent = 'Generating icon128.png...';
      await createIcon(128);
      await new Promise(r => setTimeout(r, 300));
      
      progress.innerHTML = '✅ All icons generated!<br><br>Save them to: <code style="background: rgba(0,0,0,0.3); padding: 4px 8px; border-radius: 4px;">mobile-simulator/icons/</code><br><br>Then reload the extension in Chrome.';
    }
    
    // Auto-start generation
    setTimeout(generateAll, 500);
  </script>
</body>
</html>
