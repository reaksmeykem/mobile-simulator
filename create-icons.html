<!DOCTYPE html>
<html>
<head>
  <title>Icon Generator - Mobile Simulator</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: white;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }
    h1 {
      color: #3b82f6;
      margin-bottom: 10px;
    }
    .instructions {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.3);
      padding: 20px;
      border-radius: 12px;
      max-width: 600px;
      text-align: center;
    }
    .canvas-container {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .icon-box {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      text-align: center;
    }
    canvas {
      display: block;
      margin: 10px auto;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
    }
    button {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      margin-top: 10px;
    }
    button:hover {
      background: #2563eb;
    }
    .download-all {
      background: #10b981;
      padding: 16px 32px;
      font-size: 16px;
    }
    .download-all:hover {
      background: #059669;
    }
  </style>
</head>
<body>
  <h1>📱 Mobile Simulator Icon Generator</h1>
  <div class="instructions">
    <p>Click the buttons below to download each icon size, or use "Download All" to get all three at once.</p>
    <p>Save them in the <code>mobile-simulator/icons/</code> folder as <code>icon16.png</code>, <code>icon48.png</code>, and <code>icon128.png</code></p>
  </div>
  
  <div class="canvas-container">
    <div class="icon-box">
      <h3>16×16</h3>
      <canvas id="canvas16" width="16" height="16"></canvas>
      <button onclick="downloadIcon(16)">Download 16×16</button>
    </div>
    
    <div class="icon-box">
      <h3>48×48</h3>
      <canvas id="canvas48" width="48" height="48"></canvas>
      <button onclick="downloadIcon(48)">Download 48×48</button>
    </div>
    
    <div class="icon-box">
      <h3>128×128</h3>
      <canvas id="canvas128" width="128" height="128"></canvas>
      <button onclick="downloadIcon(128)">Download 128×128</button>
    </div>
  </div>
  
  <button class="download-all" onclick="downloadAll()">⬇️ Download All Icons</button>
  
  <script>
    function createIcon(size) {
      const canvas = document.getElementById(`canvas${size}`);
      const ctx = canvas.getContext('2d');
      
      // Background gradient
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#3b82f6');
      gradient.addColorStop(1, '#1e40af');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);
      
      // Phone shape
      const phoneWidth = size * 0.5;
      const phoneHeight = size * 0.7;
      const phoneX = (size - phoneWidth) / 2;
      const phoneY = (size - phoneHeight) / 2;
      const radius = size * 0.08;
      
      // Phone body
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath();
      ctx.roundRect(phoneX, phoneY, phoneWidth, phoneHeight, radius);
      ctx.fill();
      
      // Screen
      const screenPadding = size * 0.02;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.roundRect(
        phoneX + screenPadding, 
        phoneY + screenPadding, 
        phoneWidth - screenPadding * 2, 
        phoneHeight - screenPadding * 2, 
        radius * 0.7
      );
      ctx.fill();
      
      // Notch (for larger icons)
      if (size >= 48) {
        const notchWidth = phoneWidth * 0.4;
        const notchHeight = size * 0.04;
        ctx.fillStyle = '#1a1a1a';
        ctx.beginPath();
        ctx.roundRect(
          phoneX + (phoneWidth - notchWidth) / 2,
          phoneY + screenPadding,
          notchWidth,
          notchHeight,
          notchHeight / 2
        );
        ctx.fill();
      }
    }
    
    function downloadIcon(size) {
      const canvas = document.getElementById(`canvas${size}`);
      const link = document.createElement('a');
      link.download = `icon${size}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
    
    function downloadAll() {
      [16, 48, 128].forEach((size, index) => {
        setTimeout(() => downloadIcon(size), index * 200);
      });
    }
    
    // Generate all icons on load
    [16, 48, 128].forEach(size => createIcon(size));
  </script>
</body>
</html>
