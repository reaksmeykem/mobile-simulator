<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="popup" id="app">
    <header>
      <h1>Mobile Simulator</h1>
    </header>

    <section class="device-section">
      <label for="deviceSelect">Select Device</label>
      <select id="deviceSelect"></select>
    </section>

    <section class="dimensions">
      <div class="dim-item">
        <span class="label">Width</span>
        <span class="value" id="widthDisplay">-</span>
      </div>
      <div class="dim-item">
        <span class="label">Height</span>
        <span class="value" id="heightDisplay">-</span>
      </div>
    </section>

    <section class="controls">
      <button id="applyBtn">Apply Simulator</button>
      <button id="rotateBtn">Rotate</button>
      <button id="resetBtn">Close Simulator</button>
    </section>

    <section class="options">
      <label class="checkbox">
        <input type="checkbox" id="changeUA" checked>
        <span>Change User Agent</span>
      </label>
      <label class="checkbox">
        <input type="checkbox" id="addFrame" checked>
        <span>Show Device Frame</span>
      </label>
    </section>

    <section class="current-info">
      <p>Current Device</p>
      <strong id="currentDevice">-</strong>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
