<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="popup" id="app">
    <header>
      <h1>Mobile Simulator</h1>
    </header>

    <section class="device-section">
      <label for="devicePickerButton">Select Device</label>
      <select id="deviceSelect" hidden></select>
      <button type="button" class="device-picker-button" id="devicePickerButton" aria-expanded="false">
        <span class="device-picker-copy">
          <strong id="devicePickerName">iPhone 17 Pro</strong>
          <small id="devicePickerMeta">402 x 874 px</small>
        </span>
        <span class="device-picker-icon" id="devicePickerIcon" aria-hidden="true">v</span>
      </button>
      <div class="device-picker-panel" id="devicePickerPanel"></div>
    </section>

    <section class="controls">
      <button id="applyBtn">Apply Simulator</button>
      <button id="rotateBtn">Rotate</button>
      <button id="resetBtn">Close Simulator</button>
    </section>

    <section class="options">
      <label class="checkbox">
        <input type="checkbox" id="changeUA" checked>
        <span>Change User Agent</span>
      </label>
      <label class="checkbox">
        <input type="checkbox" id="addFrame" checked>
        <span>Show Device Frame</span>
      </label>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
