<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
  <script defer src="lib/alpine.min.js"></script>
</head>
<body>
  <div class="popup" x-data="mobileSimulator()" x-init="init()">
    <header>
      <h1>📱 Mobile Simulator</h1>
    </header>

    <section class="device-section">
      <label>Device</label>
      <select x-model="selectedDevice" @change="simulate()">
        <optgroup label="📱 iPhone">
          <template x-for="device in devices.filter(d => d.name.includes('iPhone'))" :key="device.name">
            <option :value="device.name" x-text="device.name"></option>
          </template>
        </optgroup>
        <optgroup label="📱 Samsung">
          <template x-for="device in devices.filter(d => d.name.includes('Samsung'))" :key="device.name">
            <option :value="device.name" x-text="device.name"></option>
          </template>
        </optgroup>
        <optgroup label="📱 Android">
          <template x-for="device in devices.filter(d => d.name.includes('Pixel'))" :key="device.name">
            <option :value="device.name" x-text="device.name"></option>
          </template>
        </optgroup>
        <optgroup label="📱 Tablets">
          <template x-for="device in devices.filter(d => d.name.includes('iPad'))" :key="device.name">
            <option :value="device.name" x-text="device.name"></option>
          </template>
        </optgroup>
      </select>
    </section>

    <section class="dimensions">
      <div class="dim-item">
        <span class="label">Width</span>
        <span class="value" x-text="currentWidth + 'px'"></span>
      </div>
      <div class="dim-item">
        <span class="label">Height</span>
        <span class="value" x-text="currentHeight + 'px'"></span>
      </div>
    </section>

    <section class="controls">
      <button @click="rotate()" x-text="isRotated ? '🔄 Reset' : '🔁 Rotate'"></button>
      <button @click="reset()">✕ Reset</button>
    </section>

    <section class="options">
      <label class="checkbox">
        <input type="checkbox" x-model="changeUserAgent" @change="simulate()">
        <span>Change User Agent</span>
      </label>
      <label class="checkbox">
        <input type="checkbox" x-model="addFrame" @change="simulate()">
        <span>Show Device Frame</span>
      </label>
    </section>

    <section class="current-info">
      <p>Current: <strong x-text="selectedDevice"></strong></p>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
